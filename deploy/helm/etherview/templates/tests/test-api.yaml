apiVersion: v1
kind: Pod
metadata:
  name: {{ include "etherview.fullname" . }}-test-api
  labels:
    helm.sh/chart: {{ include "etherview.chart" . }}
    app.kubernetes.io/component: test
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.16.0
      args: ["--fail", "--silent", "http://{{ include "etherview.fullname" . }}:{{ .Values.service.port }}/health/live"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        readOnlyRootFilesystem: true
