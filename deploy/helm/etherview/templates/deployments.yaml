{{- $root := . }}
{{- range $roleName, $role := .Values.roles }}
{{- $enabled := $role.enabled }}
{{- if eq $root.Values.mode "monolith" }}
{{- $enabled = eq $roleName "all" }}
{{- else }}
{{- $enabled = and (ne $roleName "all") $role.enabled }}
{{- end }}
{{- if $enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etherview.fullname" $root }}-{{ $roleName }}
  labels:
    {{- include "etherview.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
spec:
  {{- if not $role.autoscaling.enabled }}
  replicas: {{ $role.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "etherview.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ $roleName }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $root.Template.BasePath "/configmap.yaml") $root | sha256sum }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "etherview.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $roleName }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "etherview.serviceAccountName" $root }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ $root.Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: schema-compatibility
          image: {{ include "etherview.image" $root }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          args: ["migrate", "status", "--config", "/etc/etherview/config.yaml"]
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          env:
            - name: ETHERVIEW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.databaseURLKey | quote }}
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/etherview
              readOnly: true
            - name: tmp
              mountPath: /tmp
      containers:
        - name: etherview
          image: {{ include "etherview.image" $root }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          args: ["serve", "--config", "/etc/etherview/config.yaml", "--roles={{ $roleName }}"]
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          env:
            - name: ETHERVIEW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.databaseURLKey | quote }}
            - name: ETHERVIEW_RPC_URLS
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.rpcURLsKey | quote }}
                  optional: true
            - name: ETHERVIEW_API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.apiKeyPepperKey | quote }}
                  optional: true
            - name: ETHERVIEW_NATS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.natsURLKey | quote }}
                  optional: true
            - name: ETHERVIEW_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.redisURLKey | quote }}
                  optional: true
            - name: ETHERVIEW_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.s3AccessKeyKey | quote }}
                  optional: true
            - name: ETHERVIEW_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.s3SecretKeyKey | quote }}
                  optional: true
            - name: ETHERVIEW_S3_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.s3SessionTokenKey | quote }}
                  optional: true
            - name: ETHERVIEW_OTLP_TRACE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.otlpTraceEndpointKey | quote }}
                  optional: true
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.secrets.existingSecret | quote }}
                  key: {{ $root.Values.secrets.otlpTraceHeadersKey | quote }}
                  optional: true
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          {{- if or (eq $roleName "all") (eq $roleName "api") }}
            - name: http
              containerPort: {{ $root.Values.service.targetPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
          {{- else }}
          startupProbe:
            httpGet:
              path: /health/live
              port: metrics
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/ready
              port: metrics
            periodSeconds: 5
            timeoutSeconds: 2
          {{- end }}
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/etherview
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "etherview.fullname" $root }}-config
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
