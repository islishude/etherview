{{- $root := . }}
{{- range $roleName, $role := .Values.roles }}
{{- $enabled := $role.enabled }}
{{- if eq $root.Values.mode "monolith" }}
{{- $enabled = eq $roleName "all" }}
{{- else }}
{{- $enabled = and (ne $roleName "all") $role.enabled }}
{{- end }}
{{- if and $enabled $role.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "etherview.fullname" $root }}-{{ $roleName }}
  labels:
    {{- include "etherview.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "etherview.fullname" $root }}-{{ $roleName }}
  minReplicas: {{ $role.autoscaling.minReplicas }}
  maxReplicas: {{ $role.autoscaling.maxReplicas }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $role.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
