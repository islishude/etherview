apiVersion: v1
kind: Service
metadata:
  name: {{ include "etherview.fullname" . }}-metrics
  labels:
    {{- include "etherview.labels" . | nindent 4 }}
    etherview.io/metrics-service: "true"
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "etherview.selectorLabels" . | nindent 4 }}
