name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Generate, lint, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run deterministic common gates
        run: make install-lint-tools toolchain-check plan-check generate-check lint test test-race

      - name: Reject unexpected workspace changes
        run: git diff --check && git diff --exit-code

  integration:
    name: PostgreSQL integration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: etherview
          POSTGRES_USER: etherview
          POSTGRES_PASSWORD: etherview
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etherview -d etherview"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      INTEGRATION_DATABASE_URL: postgres://etherview:etherview@127.0.0.1:5432/etherview?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: Add Go Bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install npm dependencies
        run: npm --prefix web ci --ignore-scripts
      - name: Build frontend assets
        run: make web-build
      - name: Run migrations and integration tests
        run: make test-integration

  browser:
    name: Embedded SPA browser E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PLAYWRIGHT_USE_BUNDLED: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: Add Go Bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend and browser
        run: |
          npm --prefix web ci --ignore-scripts
          npm --prefix web exec -- playwright install --with-deps chromium
      - name: Build frontend assets
        run: make web-build
      - name: Run embedded-binary browser flows
        run: make test-e2e

  security:
    name: Security and licenses
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: Add Go Bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install pinned security and license tools
        run: make install-security-tools
      - name: Audit source and dependencies
        run: make security-check license-check

  deployment:
    name: Container, Compose, and Helm
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: azure/setup-helm@v5
      - name: Validate Dockerfile, Compose profiles, and Helm templates
        run: make deployment-check
      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: false
          load: true
          tags: etherview:local
          cache-from: type=gha,scope=smock-check-${{ runner.os }}-${{ runner.arch }}
          cache-to: type=gha,mode=max,scope=smock-check-${{ runner.os }}-${{ runner.arch }},ignore-error=true
      - name: Smoke test the production image
        run: docker run --rm etherview:local version
      - name: Smoke test the PostgreSQL schema lifecycle
        run: make compose-schema-smoke
