name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  GOPATH: /tmp/etherview-ci-go
  GOMODCACHE: /tmp/etherview-ci-go/pkg/mod
  GOCACHE: /tmp/etherview-ci-go-build
  GOFLAGS: -mod=readonly
  NPM_CONFIG_CACHE: /tmp/etherview-ci-npm-cache

jobs:
  quality:
    name: Generate, lint, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install exact npm and verify toolchain
        run: |
          npm install --global npm@11.16.0
          make toolchain-check
      - name: Run deterministic common gates
        run: make toolchain-check plan-check generate-check lint test test-race
      - name: Reject unexpected workspace changes
        run: git diff --check && git diff --exit-code

  integration:
    name: PostgreSQL integration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: etherview
          POSTGRES_USER: etherview
          POSTGRES_PASSWORD: etherview
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etherview -d etherview"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      INTEGRATION_DATABASE_URL: postgres://etherview:etherview@127.0.0.1:5432/etherview?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum
      - name: Run migrations and integration tests
        run: make test-integration

  browser:
    name: Embedded SPA browser E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PLAYWRIGHT_USE_BUNDLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install exact npm and verify toolchain
        run: |
          npm install --global npm@11.16.0
          make toolchain-check
      - name: Install frontend and browser
        run: |
          npm --prefix web ci --ignore-scripts
          npm --prefix web exec -- playwright install --with-deps chromium
      - name: Run embedded-binary browser flows
        run: make test-e2e

  security:
    name: Security and licenses
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TOOLS_BIN: /tmp/etherview-ci-tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: |
            go.sum
            Makefile
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install exact npm and verify toolchain
        run: |
          npm install --global npm@11.16.0
          make toolchain-check
      - name: Install pinned security and license tools
        run: make install-security-tools
      - name: Audit source and dependencies
        run: make security-check license-check

  deployment:
    name: Container, Compose, and Helm
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.18.4
      - name: Validate Dockerfile, Compose profiles, and Helm templates
        run: make deployment-check
      - name: Build production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: production
          push: false
          load: true
          tags: etherview:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test the PostgreSQL schema lifecycle
        run: make compose-schema-smoke
