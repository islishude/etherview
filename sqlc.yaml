version: "2"
sql:
  - engine: postgresql
    schema: internal/store/migrations
    queries: internal/db/queries
    gen:
      go:
        package: dbgen
        out: internal/db/gen
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        emit_pointers_for_null_types: true
        query_parameter_limit: 3
