        stats:
          type: boolean
        token:
          type: boolean
    AggregateStats:
      type: object
      required:
        - chain_id
        - from_block
        - to_block
        - snapshot
        - block_count
        - transaction_count
        - gas_used
        - burned_wei
        - blob_burned_wei
        - token_event_count
        - token_transfer_count
        - nft_transfer_count
        - completeness
      properties:
        chain_id:
          $ref: "#/components/schemas/Quantity"
        from_block:
          $ref: "#/components/schemas/Quantity"
        to_block:
          $ref: "#/components/schemas/Quantity"
        snapshot:
          $ref: "#/components/schemas/CatalogSnapshot"
