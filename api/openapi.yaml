      required: [kind, key, label, rank]
      properties:
        kind:
          type: string
          enum: [block, transaction, address, contract, token, nft, label]
        key:
          type: string
        label:
          type: string
        rank:
          type: integer
        canonical:
          type: boolean
    VerificationSubmission:
      type: object
      required:
        - address
        - code_hash
        - at_block_hash
        - language
        - compiler_version
        - contract_identifier
        - standard_json
        - creation_bytecode
        - runtime_bytecode
      properties:
        address:
          $ref: "#/components/schemas/Address"
        code_hash:
          $ref: "#/components/schemas/Hash"
        at_block_hash:
          $ref: "#/components/schemas/Hash"
        language:
          type: string
          enum: [solidity, vyper]
        compiler_version:
          type: string
          minLength: 1
          maxLength: 128
        contract_identifier:
          type: string
          minLength: 3
          maxLength: 1024
        standard_json:
          type: object
          additionalProperties: true
        creation_bytecode:
          type: string
          pattern: '^0x[0-9a-fA-F]*$'
        runtime_bytecode:
          type: string
          pattern: '^0x[0-9a-fA-F]*$'
          minLength: 4
          description: Non-empty deployed runtime bytecode whose Keccak-256 digest must equal code_hash.
        submit_to_sourcify:
          type: boolean
          default: false
    VerificationMatch:
      type: string
      enum: [exact, metadata_only, mismatch]
    VerificationJob:
      type: object
      required: [id, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        result_kind:
          $ref: "#/components/schemas/VerificationMatch"
        creation_match:
          $ref: "#/components/schemas/VerificationMatch"
        runtime_match:
          $ref: "#/components/schemas/VerificationMatch"
        published:
          type: boolean
        error_code:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VerifiedContract:
      type: object
      required:
        - chain_id
        - address
        - code_hash
        - valid_from_block
        - language
        - compiler_version
        - match_kind
        - contract_name
        - abi
        - sources
        - settings
        - created_at
      properties:
        chain_id:
          $ref: "#/components/schemas/Quantity"
        address:
          $ref: "#/components/schemas/Address"
        code_hash:
          $ref: "#/components/schemas/Hash"
        valid_from_block:
