          $ref: "#/components/schemas/Quantity"
        token_transfer_count:
          $ref: "#/components/schemas/Quantity"
        nft_transfer_count:
          $ref: "#/components/schemas/Quantity"
        average_tps:
          $ref: "#/components/schemas/Decimal"
          description: Weighted TPS across only blocks with an exact parent interval; omitted when the range has no such interval.
        completeness:
          $ref: "#/components/schemas/AggregateStatsCompleteness"
    TraceFrame:
      type: object
      required: [path, parent_path, depth, call_type, reverted]
      properties:
        path:
          type: array
          items:
            type: integer
            minimum: 0
        parent_path:
          type: array
          items:
            type: integer
            minimum: 0
        depth:
          type: integer
          minimum: 0
        call_type:
          type: string
        from:
          $ref: "#/components/schemas/Address"
        to:
          $ref: "#/components/schemas/Address"
        created_address:
          $ref: "#/components/schemas/Address"
        value:
          $ref: "#/components/schemas/Quantity"
        gas:
          $ref: "#/components/schemas/Quantity"
        gas_used:
          $ref: "#/components/schemas/Quantity"
        input:
          type: string
          pattern: '^0x[0-9a-fA-F]*$'
        output:
          type: string
          pattern: '^0x[0-9a-fA-F]*$'
        error:
          type: string
        reverted:
          type: boolean
    TransactionTrace:
      type: object
      required:
        - chain_id
        - block_number
        - block_hash
